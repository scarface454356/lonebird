<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>easter bird</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #1b2a32;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }
    .game-container {
      background: #0f1a1f;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      box-shadow: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-height: 100vh;
      aspect-ratio: 360 / 640;
      background: #1f4a5c;
      box-shadow: inset 0 0 0 2px #6b9eb0, 0 10px 15px -5px #030b0f;
      cursor: pointer;
      touch-action: none;
      border-radius: 0;
    }
    @media (min-aspect-ratio: 360/640) {
      canvas {
        width: auto;
        height: 100vh;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="360" height="640"></canvas>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // dimensions
    const CANVAS_W = 360;
    const CANVAS_H = 640;

    // ===== DELTA TIME VARIABLES =====
    let lastTimestamp = 0;
    let deltaTime = 1;

    // ===== GAME CONSTANTS =====
    const BASE_GRAVITY = 0.35;
    const BASE_LIFT = -8.0;
    const BASE_MAX_VELOCITY = 12.0;
    const BASE_PIPE_SPEED = 3.8;
    const BASE_CLOUD_SPEED = 0.02;
    const BASE_BUTTERFLY_SPEED = 0.5;
    const BASE_FIREFLY_SPEED = 0.2;
    const BASE_GRASS_SWAY = 1.2;
    
    let GRAVITY, LIFT, MAX_VELOCITY, PIPE_SPEED, CLOUD_SPEED, BUTTERFLY_SPEED, FIREFLY_SPEED, GRASS_SWAY;

    const PIPE_WIDTH = 48;
    const PIPE_GAP = 135;
    const PIPE_SPACING = 280;
    const GROUND_HEIGHT = 60;
    const SKY_CEILING = 20;
    const BIRD_RADIUS = 16;

    // main bird
    let bird = {
      x: 70,
      y: CANVAS_H / 2,
      vy: 0,
      rotation: 0,
      targetRotation: 0,
      wingPhase: 0
    };

    let birdTrail = [];

    let pipes = [];
    let score = 0;
    let bestScore = 0;

    let gameState = 'ready';

    try {
      const saved = localStorage.getItem('lonelybird_best');
      if (saved) bestScore = parseInt(saved) || 0;
    } catch(e) {}

    // background birds
    let bgBirds = [];
    const BG_BIRD_COUNT = 4;
    function initBgBirds() {
      for (let i = 0; i < BG_BIRD_COUNT; i++) {
        bgBirds.push({
          x: Math.random() * CANVAS_W,
          y: Math.random() * (CANVAS_H - GROUND_HEIGHT - 100) + 50,
          speed: 0.3 + Math.random() * 1.0,
          size: 6 + Math.random() * 8,
          wingPhase: Math.random() * Math.PI * 2,
          flapSpeed: 0.05 + Math.random() * 0.1
        });
      }
    }
    initBgBirds();

    function updateBgBirds(delta) {
      for (let b of bgBirds) {
        b.x += b.speed * delta;
        b.wingPhase += b.flapSpeed * delta;
        if (b.x > CANVAS_W + 30) {
          b.x = -30;
          b.y = Math.random() * (CANVAS_H - GROUND_HEIGHT - 100) + 50;
        }
      }
    }

    let buttonRect = { x: 0, y: 0, w: 140, h: 50 };
    let easterContinueRect = { x: 60, y: 400, w: 100, h: 40 };
    let easterGoRect = { x: 200, y: 400, w: 120, h: 40 };

    let specialBird = {
      x: 0, y: 0,
      targetX: 0,
      targetY: 0,
      phase: 'entering',
      flowerBob: 0,
      speed: 2.5
    };

    let birdStartPos = { x: 0, y: 0 };
    let fadeAlpha = 0;
    const FADE_SPEED = 0.02;

    let crying = false;
    let darknessActive = false;
    let darknessLevel = 0;
    const DARKNESS_INCREASE_RATE = 0.0005;

    let flower = {
      active: false,
      x: 0,
      y: 0,
      radius: 8,
      collected: false
    };
    let spawnFlowerNextPipe = false;

    let portalTimer = 0;
    const PORTAL_DURATION = 60;
    let portalTargetX = 0;
    let portalTargetY = 0;

    let mario = {
      active: false,
      x: 0,
      y: 0,
      phase: 'appearing',
      timer: 0,
      fireballs: [],
      fireballCount: 0,
      throwDelay: 30,
      throwTimer: 0
    };

    let evilMario = {
      active: false,
      x: 0,
      y: 0,
      phase: 'appearing',
      timer: 0,
      beams: [],
      beamCount: 0,
      throwDelay: 25,
      throwTimer: 0,
      hellFireAlpha: 0
    };

    let powerStone = {
      active: false,
      x: 0,
      y: 0,
      radius: 12,
      collected: false
    };
    let powerMode = false;
    let powerTimer = 0;
    const POWER_DURATION = 60 * 120;
    let powerExplosions = [];

    let heartbreakTimer = 0;
    let heartbreakPhase = 0;
    let heartbreakFemaleX = 250, heartbreakFemaleY = 300;
    let heartbreakMaleX = 70, heartbreakMaleY = 300;
    let heartbreakConfidentX = -50, heartbreakConfidentY = 250;
    let heartbreakConfidentTargetX = 200, heartbreakConfidentTargetY = 280;
    let heartbreakTriggerPipe = null;

    let fireParticles = [];
    const FIRE_COUNT = 30;
    function initFireParticles() {
      for (let i = 0; i < FIRE_COUNT; i++) {
        fireParticles.push({
          x: Math.random() * CANVAS_W,
          y: CANVAS_H - GROUND_HEIGHT - Math.random() * 200,
          size: 5 + Math.random() * 10,
          speedY: 1 + Math.random() * 3,
          alpha: 0.5 + Math.random() * 0.5,
          phase: Math.random() * Math.PI * 2
        });
      }
    }
    initFireParticles();

    function updateFireParticles(delta) {
      for (let p of fireParticles) {
        p.y -= p.speedY * delta;
        p.phase += 0.1 * delta;
        p.alpha = 0.5 + 0.4 * Math.sin(p.phase);
        if (p.y < -20) {
          p.y = CANVAS_H - GROUND_HEIGHT;
          p.x = Math.random() * CANVAS_W;
        }
      }
    }

    function drawFireParticles() {
      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#ff6600';
      for (let p of fireParticles) {
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = '#ff3300';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, 2*Math.PI);
        ctx.fill();
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath();
        ctx.arc(p.x - 2, p.y - 2, p.size * 0.4, 0, 2*Math.PI);
        ctx.fill();
      }
      ctx.restore();
    }

    // ===== DAY/NIGHT CYCLE =====
    let dayNightProgress = 0;
    let dayNightDirection = 0.0002;

    let butterflies = [];
    const BUTTERFLY_COUNT = 5;
    function initButterflies() {
      for (let i = 0; i < BUTTERFLY_COUNT; i++) {
        butterflies.push({
          x: Math.random() * CANVAS_W,
          y: Math.random() * (CANVAS_H - GROUND_HEIGHT - 50) + 30,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.3,
          size: 4 + Math.random() * 4,
          wingPhase: Math.random() * Math.PI * 2,
          wingSpeed: 0.05 + Math.random() * 0.1,
          color: `hsl(${Math.random() * 60 + 300}, 80%, 70%)`
        });
      }
    }
    initButterflies();

    let fireflies = [];
    const FIREFLY_COUNT = 8;
    function initFireflies() {
      for (let i = 0; i < FIREFLY_COUNT; i++) {
        fireflies.push({
          x: Math.random() * CANVAS_W,
          y: Math.random() * (CANVAS_H - GROUND_HEIGHT - 50) + 30,
          vx: (Math.random() - 0.5) * 0.2,
          vy: (Math.random() - 0.5) * 0.1,
          brightness: 0.5 + Math.random() * 0.5,
          phase: Math.random() * Math.PI * 2,
          size: 2 + Math.random() * 2
        });
      }
    }
    initFireflies();

    function updateNightElements(delta) {
      for (let b of butterflies) {
        b.x += b.vx * delta;
        b.y += b.vy * delta;
        b.wingPhase += b.wingSpeed * delta;
        if (b.x < -20) b.x = CANVAS_W + 20;
        if (b.x > CANVAS_W + 20) b.x = -20;
        if (b.y < -20) b.y = CANVAS_H - GROUND_HEIGHT + 20;
        if (b.y > CANVAS_H - GROUND_HEIGHT + 20) b.y = -20;
      }
      for (let f of fireflies) {
        f.x += f.vx * delta;
        f.y += f.vy * delta;
        f.phase += 0.02 * delta;
        if (f.x < -10) f.x = CANVAS_W + 10;
        if (f.x > CANVAS_W + 10) f.x = -10;
        if (f.y < -10) f.y = CANVAS_H - GROUND_HEIGHT + 10;
        if (f.y > CANVAS_H - GROUND_HEIGHT + 10) f.y = -10;
      }
    }

    function drawButterflies() {
      for (let b of butterflies) {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.fillStyle = '#8b5a2b';
        ctx.beginPath();
        ctx.ellipse(0, 0, 2, b.size/2, 0, 0, 2*Math.PI);
        ctx.fill();
        let flap = Math.sin(b.wingPhase) * 0.5;
        ctx.fillStyle = b.color;
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#ffaaee';
        ctx.beginPath();
        ctx.ellipse(-4, -2 + flap*2, b.size, b.size*0.7, -0.2, 0, 2*Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(4, -2 + flap*2, b.size, b.size*0.7, 0.2, 0, 2*Math.PI);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawFireflies() {
      ctx.shadowBlur = 10;
      for (let f of fireflies) {
        let glow = f.brightness * (0.8 + 0.4 * Math.sin(f.phase));
        ctx.fillStyle = `rgba(255, 255, 180, ${glow})`;
        ctx.shadowColor = '#ffffaa';
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.size * (1 + 0.2*Math.sin(f.phase)), 0, 2*Math.PI);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    function drawSunAt(x, y, alpha) {
      let time = Date.now() * 0.002;
      let pulse = 1 + 0.05 * Math.sin(time * 2);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowColor = '#ffdd88';
      ctx.shadowBlur = 30;
      ctx.beginPath();
      ctx.arc(x, y, 32 * pulse, 0, Math.PI * 2);
      ctx.fillStyle = '#ffdb7c';
      ctx.fill();
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(x, y, 22 * pulse, 0, Math.PI * 2);
      ctx.fillStyle = '#ffe68f';
      ctx.fill();
      ctx.shadowBlur = 15;
      ctx.strokeStyle = '#ffecaa';
      ctx.lineWidth = 4;
      for (let i = 0; i < 8; i++) {
        let angle = i * Math.PI / 4 + time;
        let dx = Math.cos(angle) * 40;
        let dy = Math.sin(angle) * 40;
        ctx.beginPath();
        ctx.moveTo(x + dx * 0.5, y + dy * 0.5);
        ctx.lineTo(x + dx, y + dy);
        ctx.stroke();
      }
      ctx.restore();
    }

    // Enhanced moon
    function drawMoonAt(x, y, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowColor = '#ffffaa';
      ctx.shadowBlur = 40;
      ctx.fillStyle = '#ffffcc';
      ctx.beginPath();
      ctx.arc(x, y, 32, 0, 2*Math.PI);
      ctx.fill();
      ctx.shadowBlur = 30;
      ctx.fillStyle = '#f8f8ff';
      ctx.beginPath();
      ctx.arc(x, y, 28, 0, 2*Math.PI);
      ctx.fill();
      ctx.shadowBlur = 5;
      ctx.fillStyle = '#dddddd';
      ctx.beginPath();
      ctx.arc(x - 8, y - 5, 5, 0, 2*Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 10, y + 3, 4, 0, 2*Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 2, y - 12, 3, 0, 2*Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x - 15, y + 8, 4, 0, 2*Math.PI);
      ctx.fill();
      ctx.restore();
    }

    function getSkyColor(progress) {
      let t = Math.sin(progress * Math.PI);
      let dayTop = {r: 0x7e, g: 0xc8, b: 0xe0};
      let dayBottom = {r: 0xe0, g: 0xc5, b: 0x8f};
      let nightTop = {r: 0x0a, g: 0x0a, b: 0x1a};
      let nightBottom = {r: 0x2a, g: 0x1a, b: 0x3a};
      
      let r1 = dayTop.r * t + nightTop.r * (1-t);
      let g1 = dayTop.g * t + nightTop.g * (1-t);
      let b1 = dayTop.b * t + nightTop.b * (1-t);
      let r2 = dayBottom.r * t + nightBottom.r * (1-t);
      let g2 = dayBottom.g * t + nightBottom.g * (1-t);
      let b2 = dayBottom.b * t + nightBottom.b * (1-t);
      
      return {
        top: `rgb(${Math.round(r1)},${Math.round(g1)},${Math.round(b1)})`,
        bottom: `rgb(${Math.round(r2)},${Math.round(g2)},${Math.round(b2)})`
      };
    }

    function drawBackground() {
      if (gameState === 'mario2') {
        const hellGrad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
        hellGrad.addColorStop(0, '#4a0000');
        hellGrad.addColorStop(0.5, '#8b0000');
        hellGrad.addColorStop(1, '#ff4500');
        ctx.fillStyle = hellGrad;
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H - GROUND_HEIGHT);
        
        let pulse = Math.sin(Date.now() * 0.005) * 0.1 + 0.2;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#ff3300';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H - GROUND_HEIGHT);
        ctx.globalAlpha = 1;
        return;
      }

      let colors = getSkyColor(dayNightProgress);
      const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
      grad.addColorStop(0, colors.top);
      grad.addColorStop(0.7, colors.bottom);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H - GROUND_HEIGHT);

      if (dayNightProgress < 0.2 || dayNightProgress > 0.8) {
        ctx.save();
        ctx.globalAlpha = 0.1 * (1 - Math.abs(dayNightProgress - 0.5) * 2);
        ctx.fillStyle = '#ffffff';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ffffff';
        ctx.beginPath();
        ctx.arc(100, 100, 80, 0, 2*Math.PI);
        ctx.arc(250, 150, 60, 0, 2*Math.PI);
        ctx.arc(300, 80, 40, 0, 2*Math.PI);
        ctx.fill();
        ctx.restore();
      }

      let sunX, sunY, sunAlpha = 0;
      let moonX, moonY, moonAlpha = 0;

      if (dayNightProgress >= 0.2 && dayNightProgress <= 0.8) {
        let t = (dayNightProgress - 0.2) / 0.6;
        sunX = 50 + t * 260;
        let heightFactor = 1 - Math.pow(2*t - 1, 2);
        sunY = 100 + 200 * heightFactor;
        sunAlpha = Math.sin(t * Math.PI);
      }

      if (dayNightProgress < 0.2 || dayNightProgress > 0.8) {
        let t;
        if (dayNightProgress < 0.2) {
          t = 1 - dayNightProgress / 0.2;
        } else {
          t = 1 - (dayNightProgress - 0.8) / 0.2;
        }
        moonX = 300 - t * 260;
        let heightFactor = 1 - Math.pow(2*t - 1, 2);
        moonY = 100 + 200 * heightFactor;
        moonAlpha = Math.sin(t * Math.PI);
      }

      if (sunAlpha > 0) drawSunAt(sunX, sunY, sunAlpha);
      if (moonAlpha > 0) drawMoonAt(moonX, moonY, moonAlpha);

      if (dayNightProgress < 0.2 || dayNightProgress > 0.8) {
        drawStars(dayNightProgress);
      }

      ctx.shadowColor = '#00000040';
      ctx.shadowBlur = 20;
      ctx.shadowOffsetY = 3;
      
      function drawCloudPart(x, y, radius, color1, color2) {
        let grad = ctx.createRadialGradient(x-5, y-5, 5, x, y, radius);
        grad.addColorStop(0, color1);
        grad.addColorStop(1, color2);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI*2);
        ctx.fill();
      }

      ctx.globalAlpha = 0.95;
      for (let c of clouds) {
        drawCloudPart(c.currentX || c.baseX, c.currentY || c.baseY, c.radius, '#ffffff', '#e0e0e0');
      }

      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;
      ctx.globalAlpha = 1;
    }

    function drawStars(progress) {
      let starCount = 60;
      let time = Date.now() * 0.002;
      ctx.fillStyle = '#ffffff';
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#ffffaa';
      for (let i = 0; i < starCount; i++) {
        let x = (i * 13 + time * 10) % CANVAS_W;
        let y = (i * 9 + time * 5) % (CANVAS_H - GROUND_HEIGHT - 100) + 20;
        let twinkle = 0.5 + 0.5 * Math.sin(time * 3 + i);
        ctx.globalAlpha = twinkle * (0.8 + 0.2 * Math.sin(progress * Math.PI));
        let size = 1 + (i % 3) * 0.5;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, 2*Math.PI);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    let clouds = [
      { baseX: 70, baseY: 55, radius: 30, speed: 0.05, offset: 0, driftX: 2, driftY: 0.5 },
      { baseX: 100, baseY: 40, radius: 26, speed: 0.03, offset: 1, driftX: 1.5, driftY: 0.3 },
      { baseX: 120, baseY: 65, radius: 28, speed: 0.04, offset: 2, driftX: 2.2, driftY: -0.2 },
      { baseX: 50, baseY: 75, radius: 24, speed: 0.06, offset: 0.5, driftX: 1, driftY: 0.1 },
      { baseX: 85, baseY: 80, radius: 22, speed: 0.02, offset: 1.2, driftX: 1.8, driftY: -0.4 },
      { baseX: 200, baseY: 35, radius: 32, speed: 0.05, offset: 0, driftX: 2.5, driftY: 0.2 },
      { baseX: 230, baseY: 45, radius: 30, speed: 0.03, offset: 1.5, driftX: 1.2, driftY: 0.6 },
      { baseX: 260, baseY: 25, radius: 28, speed: 0.04, offset: 2.2, driftX: 2, driftY: -0.3 },
      { baseX: 180, baseY: 50, radius: 24, speed: 0.06, offset: 0.8, driftX: 1.4, driftY: 0.4 },
      { baseX: 215, baseY: 60, radius: 26, speed: 0.02, offset: 1.8, driftX: 2.1, driftY: -0.1 },
      { baseX: 310, baseY: 80, radius: 28, speed: 0.05, offset: 0.3, driftX: 1.6, driftY: 0.3 },
      { baseX: 335, baseY: 65, radius: 30, speed: 0.03, offset: 1.1, driftX: 2.3, driftY: -0.2 },
      { baseX: 295, baseY: 100, radius: 24, speed: 0.04, offset: 2.5, driftX: 1.1, driftY: 0.5 },
      { baseX: 350, baseY: 95, radius: 22, speed: 0.06, offset: 0.6, driftX: 1.9, driftY: -0.5 },
      { baseX: 150, baseY: 105, radius: 24, speed: 0.02, offset: 1.4, driftX: 2.4, driftY: 0.2 },
      { baseX: 175, baseY: 95, radius: 20, speed: 0.03, offset: 2.0, driftX: 1.3, driftY: 0.1 },
      { baseX: 130, baseY: 90, radius: 18, speed: 0.04, offset: 0.9, driftX: 1.7, driftY: -0.3 }
    ];

    function updateClouds(delta) {
      for (let c of clouds) {
        c.offset += 0.01 * delta;
        c.currentX = c.baseX + Math.sin(c.offset) * c.driftX;
        c.currentY = c.baseY + Math.sin(c.offset * 0.7) * c.driftY;
      }
    }

    // ===== BRIGHT PIPES =====
    function drawPipes() {
      for (let p of pipes) {
        const pipeTopY = 0;
        const pipeBottomY = p.bottomY;
        const pipeTopHeight = p.gapTop;
        const pipeBottomHeight = CANVAS_H - GROUND_HEIGHT - p.bottomY;

        function drawPipeSegment(x, y, width, height) {
          ctx.fillStyle = '#5fb85f';
          ctx.shadowColor = '#0f3a1e';
          ctx.shadowBlur = 6;
          ctx.shadowOffsetY = 3;
          ctx.fillRect(x, y, width, height);

          ctx.fillStyle = '#4c9e4c';
          ctx.shadowBlur = 4;
          ctx.fillRect(x, y, 4, height);
          ctx.fillRect(x + width - 4, y, 4, height);

          ctx.fillStyle = '#3f8f3f';
          ctx.shadowBlur = 3;
          for (let i = 0; i < height; i += 18) {
            ctx.fillRect(x + 6, y + i, width - 12, 3);
          }

          ctx.fillStyle = '#a67c52';
          ctx.shadowBlur = 4;
          for (let i = 0; i < height; i += 18) {
            ctx.beginPath();
            ctx.arc(x + 10, y + i + 6, 2, 0, 2*Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + width - 10, y + i + 6, 2, 0, 2*Math.PI);
            ctx.fill();
          }

          ctx.fillStyle = '#3a7a3a';
          ctx.shadowBlur = 4;
          if (y === 0) {
            ctx.fillRect(x - 4, y + height - 20, width + 8, 20);
          } else {
            ctx.fillRect(x - 4, y, width + 8, 20);
          }

          ctx.shadowBlur = 0;
          ctx.shadowOffsetY = 0;
        }

        drawPipeSegment(p.x, pipeTopY, PIPE_WIDTH, pipeTopHeight);
        drawPipeSegment(p.x, pipeBottomY, PIPE_WIDTH, pipeBottomHeight);
      }
    }

    function drawBgBirds() {
      ctx.fillStyle = '#2d4f5e';
      ctx.shadowColor = '#00000030';
      ctx.shadowBlur = 4;
      for (let b of bgBirds) {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.beginPath();
        ctx.ellipse(0, 0, b.size * 0.5, b.size * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
        let wingFlap = Math.sin(b.wingPhase) * 0.3;
        ctx.beginPath();
        ctx.ellipse(-b.size * 0.3, -b.size * 0.1, b.size * 0.4, b.size * 0.2, -0.2 + wingFlap, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(b.size * 0.4, -b.size * 0.1, b.size * 0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.shadowBlur = 0;
    }

    function drawGround() {
      const groundTop = CANVAS_H - GROUND_HEIGHT;

      if (gameState === 'mario2') {
        const hellGroundGrad = ctx.createLinearGradient(0, groundTop, 0, CANVAS_H);
        hellGroundGrad.addColorStop(0, '#8b2500');
        hellGroundGrad.addColorStop(1, '#4a1200');
        ctx.fillStyle = hellGroundGrad;
        ctx.fillRect(0, groundTop, CANVAS_W, GROUND_HEIGHT);
        
        ctx.strokeStyle = '#ffaa00';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ff5500';
        for (let i = 0; i < 5; i++) {
          let x = (i * 70 + Date.now() * 0.02) % (CANVAS_W + 50) - 25;
          ctx.beginPath();
          ctx.moveTo(x, groundTop + 10);
          ctx.lineTo(x + 20, groundTop + 40);
          ctx.lineTo(x - 10, groundTop + 50);
          ctx.stroke();
        }
        ctx.shadowBlur = 0;
        return;
      }

      const dirtGrad = ctx.createLinearGradient(0, groundTop, 0, CANVAS_H);
      dirtGrad.addColorStop(0, '#7a5a3c');
      dirtGrad.addColorStop(0.7, '#5d3f28');
      ctx.fillStyle = dirtGrad;
      ctx.fillRect(0, groundTop, CANVAS_W, GROUND_HEIGHT);

      ctx.fillStyle = '#3e2f1d';
      ctx.fillRect(0, groundTop - 2, CANVAS_W, 4);

      ctx.shadowBlur = 4;
      ctx.lineWidth = 1.8;
      const time = Date.now() * 0.005;

      for (let i = 0; i < 30; i++) {
        let baseX = (i * 12 + time * 0.2) % (CANVAS_W + 40) - 20;
        let sway = Math.sin(i * 0.5 + time * GRASS_SWAY) * 2;
        let x1 = baseX + sway;
        let x2 = baseX + 4 + sway * 0.6;
        let height1 = 10 + Math.sin(i * 0.7 + time) * 4;
        let height2 = 8 + Math.cos(i * 0.9 + time) * 3;

        if (i % 3 === 0) ctx.strokeStyle = '#3f9142';
        else if (i % 3 === 1) ctx.strokeStyle = '#5fb85f';
        else ctx.strokeStyle = '#2f7d4f';

        ctx.beginPath();
        ctx.moveTo(x1, groundTop - 2);
        ctx.lineTo(x1 - 2, groundTop - height1);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x2, groundTop - 3);
        ctx.lineTo(x2 + 2, groundTop - height2);
        ctx.stroke();
      }

      ctx.shadowBlur = 4;
      for (let i = 0; i < 8; i++) {
        let x = (i * 45 + time * 0.1) % (CANVAS_W + 30) - 15;
        let y = groundTop - 5 + Math.sin(i + time) * 2;
        ctx.fillStyle = '#ffb3c6';
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, 2*Math.PI);
        ctx.fill();
        ctx.fillStyle = '#ffe066';
        ctx.beginPath();
        ctx.arc(x, y-2, 1, 0, 2*Math.PI);
        ctx.fill();
      }

      ctx.shadowBlur = 0;
    }

    function drawFlower() {
      if (!flower.active || flower.collected) return;
      ctx.save();
      ctx.translate(flower.x, flower.y);
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#ff69b4';
      let phase = Date.now() * 0.01;
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, 2 * Math.PI);
      ctx.fillStyle = '#ff4d6d';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-3 + Math.sin(phase)*0.5, -3 + Math.cos(phase)*0.3, 4, 0, 2 * Math.PI);
      ctx.fillStyle = '#ffb3c6';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(3 + Math.cos(phase)*0.5, -3 + Math.sin(phase)*0.3, 4, 0, 2 * Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-3 + Math.sin(phase+1)*0.5, 3 + Math.cos(phase+1)*0.3, 4, 0, 2 * Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(3 + Math.cos(phase+1)*0.5, 3 + Math.sin(phase+1)*0.3, 4, 0, 2 * Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, 0, 3, 0, 2 * Math.PI);
      ctx.fillStyle = '#ffe066';
      ctx.fill();
      ctx.restore();
      ctx.shadowBlur = 0;
    }

    function drawBirdAt(x, y, rotation, wingPhase, scale = 1, withFlower = false, flowerBob = 0, crying = false, evil = false, confident = false) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.scale(scale, scale);
      
      let bodyGrad;
      if (evil) {
        bodyGrad = ctx.createRadialGradient(-6, -6, 5, 0, 0, BIRD_RADIUS + 4);
        bodyGrad.addColorStop(0, '#8b0000');
        bodyGrad.addColorStop(0.7, '#4a0000');
      } else if (confident) {
        bodyGrad = ctx.createRadialGradient(-6, -6, 5, 0, 0, BIRD_RADIUS + 4);
        bodyGrad.addColorStop(0, '#4a90e2');
        bodyGrad.addColorStop(0.7, '#2a6fb0');
      } else {
        bodyGrad = ctx.createRadialGradient(-6, -6, 5, 0, 0, BIRD_RADIUS + 4);
        bodyGrad.addColorStop(0, '#f7cf4d');
        bodyGrad.addColorStop(0.7, '#d49b3b');
      }
      ctx.fillStyle = bodyGrad;
      ctx.shadowColor = evil ? '#ff0000' : (confident ? '#2266aa' : '#402d1a');
      ctx.shadowBlur = 12;
      ctx.shadowOffsetY = 3;
      ctx.beginPath();
      ctx.ellipse(0, 0, BIRD_RADIUS, BIRD_RADIUS * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 8;
      const wingAngle = Math.sin(wingPhase) * 0.6;
      ctx.fillStyle = evil ? '#660000' : (confident ? '#3a80d0' : '#bb7d38');
      ctx.beginPath();
      ctx.ellipse(-6 + Math.sin(wingPhase) * 3, -2, BIRD_RADIUS * 0.7, BIRD_RADIUS * 0.4, 0.3 + wingAngle * 0.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
      if (evil) {
        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(6, -5, 5, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(8, -6, 2.2, 0, 2 * Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(9, -7, 0.8, 0, 2 * Math.PI);
        ctx.fillStyle = '#fff';
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(6, -5, 5, 0, 2 * Math.PI);
        ctx.fillStyle = 'white';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(8, -6, 2.2, 0, 2 * Math.PI);
        ctx.fillStyle = '#080808';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(9, -7, 0.8, 0, 2 * Math.PI);
        ctx.fillStyle = 'white';
        ctx.fill();
      }

      ctx.beginPath();
      ctx.moveTo(15, -5);
      ctx.lineTo(24, -3);
      ctx.lineTo(16, 0);
      ctx.closePath();
      ctx.fillStyle = '#e5ac3a';
      ctx.shadowBlur = 6;
      ctx.fill();

      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.moveTo(5, 10);
      ctx.lineTo(12, 18);
      ctx.lineTo(0, 16);
      ctx.fillStyle = '#b55d1a';
      ctx.fill();

      if (crying) {
        let tearBob = Math.sin(Date.now() * 0.01) * 1.5;
        ctx.fillStyle = '#88ccff';
        ctx.shadowBlur = 4;
        ctx.shadowColor = '#2266aa';
        ctx.beginPath();
        ctx.arc(6, 2 + tearBob, 2, 0, 2*Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(10, 5 + tearBob, 1.5, 0, 2*Math.PI);
        ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.arc(6, 6 + tearBob, 1.5, 0, 2*Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(10, 9 + tearBob, 1, 0, 2*Math.PI);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      if (evil || confident) {
        ctx.shadowBlur = 20;
        ctx.shadowColor = evil ? '#ff0000' : '#44aaff';
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.arc(0, 0, BIRD_RADIUS + 8, 0, 2*Math.PI);
        ctx.fillStyle = evil ? '#ff4400' : '#88ccff';
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      ctx.restore();
      ctx.shadowBlur = 0;

      if (withFlower) {
        ctx.save();
        ctx.translate(x, y);
        let flowerX = 10 * scale;
        let flowerY = (-22 + Math.sin(flowerBob) * 2) * scale;
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#ff69b4';
        ctx.beginPath();
        ctx.arc(flowerX, flowerY, 5 * scale, 0, 2 * Math.PI);
        ctx.fillStyle = '#ff4d6d';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(flowerX - 4 * scale, flowerY - 4 * scale, 4 * scale, 0, 2 * Math.PI);
        ctx.fillStyle = '#ffb3c6';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(flowerX + 4 * scale, flowerY - 4 * scale, 4 * scale, 0, 2 * Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(flowerX - 4 * scale, flowerY + 4 * scale, 4 * scale, 0, 2 * Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(flowerX + 4 * scale, flowerY + 4 * scale, 4 * scale, 0, 2 * Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(flowerX, flowerY, 3 * scale, 0, 2 * Math.PI);
        ctx.fillStyle = '#ffe066';
        ctx.fill();
        ctx.restore();
      }
    }

    function drawBird() {
      for (let i = 0; i < birdTrail.length; i++) {
        let t = birdTrail[i];
        let alpha = 0.3 * (1 - i / birdTrail.length);
        ctx.globalAlpha = alpha;
        drawBirdAt(t.x, t.y, t.rotation, t.wingPhase, 1, false, 0, crying, powerMode);
      }
      ctx.globalAlpha = 1;
      drawBirdAt(bird.x, bird.y, bird.rotation, bird.wingPhase, 1, false, 0, crying, powerMode);
    }

    function updateTrail() {
      birdTrail.unshift({ x: bird.x, y: bird.y, rotation: bird.rotation, wingPhase: bird.wingPhase });
      if (birdTrail.length > 5) birdTrail.pop();
    }

    function drawPowerStone() {
      if (!powerStone.active || powerStone.collected) return;

      ctx.shadowBlur = 20;

      ctx.fillStyle = '#ff4444';

    function drawPowerTimer() {
      if (!powerMode) return;
      let seconds = Math.floor(powerTimer / 60);
      let minutes = Math.floor(seconds / 60);
      let secs = seconds % 60;
      let timeStr = `${minutes}:${secs < 10 ? '0' : ''}${secs}`;
      ctx.font = 'bold 24px "Segoe UI", monospace';
      ctx.fillStyle = '#ff4444';
      ctx.shadowColor = '#ff0000';

    function addExplosion(x, y) {
      powerExplosions.push({
        x: x,
        y: y,
        timer: 20
      });
    }

    function drawExplosions() {
      for (let i = powerExplosions.length - 1; i >= 0; i--) {
        let e = powerExplosions[i];
        e.timer--;
        if (e.timer <= 0) {
          powerExplosions.splice(i, 1);
          continue;
        }
        let size = 20 - e.timer;
        ctx.save();
        ctx.globalAlpha = e.timer / 20;
        ctx.fillStyle = '#ffaa00';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff4400';
        ctx.beginPath();
        ctx.arc(e.x, e.y, size, 0, 2*Math.PI);
        ctx.fill();
        ctx.restore();
      }
    }

    let portalParticles = [];
    function drawPortal(x, y, timer) {
      if (timer % 5 === 0) {
        portalParticles.push({
          x: x + (Math.random() - 0.5) * 60,
          y: y + (Math.random() - 0.5) * 60,
          size: 2 + Math.random() * 4,
          alpha: 0.7,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          life: 1
        });
      }
      for (let i = portalParticles.length - 1; i >= 0; i--) {
        let p = portalParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
        p.alpha = p.life;
        if (p.life <= 0 || p.x < -20 || p.x > CANVAS_W + 20 || p.y < -20 || p.y > CANVAS_H + 20) {
          portalParticles.splice(i, 1);
          continue;
        }
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = '#cc88ff';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#aa44ff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, 2*Math.PI);
        ctx.fill();
        ctx.restore();
      }

      let alpha = Math.sin(timer * 0.2) * 0.5 + 0.5;
      ctx.save();
      ctx.translate(x, y);
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#aa44ff';
      ctx.beginPath();
      ctx.arc(0, 0, 40 + Math.sin(timer * 0.3) * 5, 0, 2 * Math.PI);
      ctx.strokeStyle = `rgba(200, 100, 255, ${alpha})`;
      ctx.lineWidth = 5;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, 25 + Math.cos(timer * 0.4) * 3, 0, 2 * Math.PI);
      ctx.strokeStyle = `rgba(255, 150, 255, ${alpha})`;
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, 15, 0, 2 * Math.PI);
      ctx.fillStyle = `rgba(180, 100, 255, ${alpha * 0.3})`;
      ctx.fill();
      ctx.restore();
    }

        ctx.fillStyle = '#2563eb';
        ctx.fillRect(-15, 15, 12, 10);

      ctx.restore();

    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      this.moveTo(x + r, y);
      this.lineTo(x + w - r, y);
      this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r);
      this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r);
      this.quadraticCurveTo(x, y, x + r, y);
      this.closePath();
      return this;
    };

      ctx.shadowBlur = 10;
      ctx.fillText('LONELY', 60, 230);

      const btnX = (CANVAS_W - 140) / 2;
      const btnY = 400;
      buttonRect = { x: btnX, y: btnY, w: 140, h: 50 };
      drawButton('START', btnX, btnY, 140, 50, '#4fa86b', '#121f26');
    }

    function drawGameOver() {
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#00000080';
      ctx.shadowOffsetY = 6;
      const grad = ctx.createLinearGradient(30, 200, CANVAS_W - 30, 400);
      grad.addColorStop(0, '#2a1a1a');
      grad.addColorStop(1, '#1a0f0f');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(30, 200, CANVAS_W - 60, 200, 30);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;
      ctx.strokeStyle = '#d46b6b';
      ctx.lineWidth = 3;
      ctx.stroke();

      const gradOver = ctx.createLinearGradient(70, 220, 290, 270);
      gradOver.addColorStop(0, '#ff7b7b');
      gradOver.addColorStop(1, '#d44b4b');
      ctx.font = 'bold 36px "Segoe UI", "Arial Black", sans-serif';
      ctx.fillStyle = gradOver;
      ctx.shadowColor = '#8b0000';
      ctx.shadowBlur = 10;
      ctx.fillText('GAME OVER', 50, 280);
      
      ctx.shadowBlur = 8;
      ctx.font = 'bold 28px monospace';
      ctx.fillStyle = '#f5e6d3';
      ctx.fillText(`score: ${score}`, 90, 340);
      ctx.fillText(`best: ${bestScore}`, 90, 380);
      
      ctx.shadowBlur = 0;

      const btnX = (CANVAS_W - 140) / 2;
      const btnY = 430;
      buttonRect = { x: btnX, y: btnY, w: 140, h: 50 };
      drawButton('RESTART', btnX, btnY, 140, 50, '#db9f3f', '#121f26');
    }

    function drawEaster() {
      specialBird.flowerBob += 0.1;

      if (specialBird.phase === 'entering') {
        if (Math.abs(specialBird.x - specialBird.targetX) > 2) {
          if (specialBird.x < specialBird.targetX) {
            specialBird.x += specialBird.speed;
          } else {
            specialBird.x -= specialBird.speed;
          }
        } else {
          specialBird.phase = 'waiting';
        }
        if (Math.abs(specialBird.y - specialBird.targetY) > 2) {
          if (specialBird.y < specialBird.targetY) {
            specialBird.y += specialBird.speed * 0.8;
          } else {
            specialBird.y -= specialBird.speed * 0.8;
          }
        }
      } else if (specialBird.phase === 'exiting') {
        specialBird.x -= specialBird.speed;
        bird.x -= specialBird.speed;
        if (fadeAlpha < 1) {
          fadeAlpha += FADE_SPEED;
        } else {
          gameState = 'gameover';
        }
      }

      drawBackground();
      drawBgBirds();
      drawPipes();
      drawGround();
      drawFlower();
      drawPowerStone();
      if (dayNightProgress > 0.5) {
        drawButterflies();
        drawFireflies();
      }

      drawBirdAt(bird.x, bird.y, bird.rotation, bird.wingPhase, 1, false, 0, crying, powerMode);
      drawBirdAt(specialBird.x, specialBird.y, 0.2, bird.wingPhase, 1.2, true, specialBird.flowerBob);

      if (specialBird.phase === 'waiting') {
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = '#0f1a1f';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.globalAlpha = 1;

        ctx.font = 'bold 24px "Segoe UI", sans-serif';
        ctx.fillStyle = '#f5e6d3';
        ctx.shadowColor = '#000000';
        ctx.shadowBlur = 10;
        ctx.fillText('A friendly bird appears!', 50, 200);
        ctx.shadowBlur = 0;

        easterContinueRect = { x: 60, y: 400, w: 100, h: 40 };
        easterGoRect = { x: 200, y: 400, w: 120, h: 40 };
        drawButton('Continue', 60, 400, 100, 40, '#4fa86b', '#121f26');
        drawButton('Go with bird', 200, 400, 120, 40, '#db9f3f', '#121f26');
      }

      if (specialBird.phase === 'exiting' && fadeAlpha > 0) {
        ctx.globalAlpha = fadeAlpha;
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.globalAlpha = 1;
      }
    }

    function drawMarioScene() {
      if (mario.phase === 'appearing') {
        if (mario.x > 250) {
          mario.x -= 2;
        }
        mario.timer++;
        if (mario.timer > 30 && mario.x <= 250) {
          mario.phase = 'throwing';
          mario.timer = 0;
        }
      } else if (mario.phase === 'throwing') {
        mario.throwTimer++;
        if (mario.throwTimer >= mario.throwDelay && mario.fireballCount < 12) {
          mario.throwTimer = 0;
          mario.fireballCount++;
          let dx = bird.x - mario.x;
          let dy = bird.y - mario.y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          let speed = 2.5;
          mario.fireballs.push({
            x: mario.x,
            y: mario.y,
            vx: dx / dist * speed,
            vy: dy / dist * speed
          });
        }
        for (let i = mario.fireballs.length - 1; i >= 0; i--) {
          let fb = mario.fireballs[i];
          fb.x += fb.vx;
          fb.y += fb.vy;
          if (fb.x < -20 || fb.x > CANVAS_W + 20 || fb.y < -20 || fb.y > CANVAS_H + 20) {
            mario.fireballs.splice(i, 1);
          }
        }
        for (let fb of mario.fireballs) {
          let dx = bird.x - fb.x;
          let dy = bird.y - fb.y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < BIRD_RADIUS + 8) {
            gameState = 'gameover';
            break;
          }
        }
        if (mario.fireballCount >= 12 && mario.fireballs.length === 0) {
          mario.phase = 'disappearing';
          mario.timer = 0;
        }
      } else if (mario.phase === 'disappearing') {
        mario.timer++;
        mario.y -= 2;
        if (mario.timer > 40) {
          gameState = 'mario2';
          evilMario.active = true;
          evilMario.x = CANVAS_W + 30;
          evilMario.y = 300;
          evilMario.phase = 'appearing';
          evilMario.timer = 0;
          evilMario.beams = [];
          evilMario.beamCount = 0;
          evilMario.throwTimer = 0;
          evilMario.hellFireAlpha = 0;
          bird.y = CANVAS_H / 2;
          bird.vy = 0;
        }
      }

      drawBackground();
      drawBgBirds();
      drawPipes();
      drawGround();
      drawFlower();
      drawPowerStone();
      if (dayNightProgress > 0.5) {
        drawButterflies();
        drawFireflies();
      }
      drawBird();
      drawMario(mario.x, mario.y, false);
      for (let fb of mario.fireballs) {
        drawFireball(fb.x, fb.y);
      }
      drawScorePanel();
      ctx.font = 'bold 16px "Segoe UI", sans-serif';
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 6;
      ctx.fillText('Dodge the fireballs!', 100, 100);
      ctx.shadowBlur = 0;
    }

    function drawMario2Scene() {
      updateFireParticles(deltaTime);
      
      drawBackground();
      drawFireParticles();

      drawBgBirds();
      drawPipes();
      drawGround();
      drawFlower();
      drawPowerStone();
      drawBird();
      drawMario(evilMario.x, evilMario.y, true);
      
      if (evilMario.phase === 'appearing') {
        if (evilMario.x > 250) {
          evilMario.x -= 2;
        }
        evilMario.timer++;
        if (evilMario.timer > 30 && evilMario.x <= 250) {
          evilMario.phase = 'throwing';
          evilMario.timer = 0;
        }
      } else if (evilMario.phase === 'throwing') {
        evilMario.throwTimer++;
        if (evilMario.throwTimer >= evilMario.throwDelay && evilMario.beamCount < 21) {
          evilMario.throwTimer = 0;
          evilMario.beamCount++;
          let dx = bird.x - evilMario.x;
          let dy = bird.y - evilMario.y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          let speed = 2.2;
          evilMario.beams.push({
            x: evilMario.x,
            y: evilMario.y,
            vx: dx / dist * speed,
            vy: dy / dist * speed
          });
        }
        for (let i = evilMario.beams.length - 1; i >= 0; i--) {
          let b = evilMario.beams[i];
          b.x += b.vx;
          b.y += b.vy;
          if (b.x < -20 || b.x > CANVAS_W + 20 || b.y < -20 || b.y > CANVAS_H + 20) {
            evilMario.beams.splice(i, 1);
          }
        }
        for (let b of evilMario.beams) {
          let dx = bird.x - b.x;
          let dy = bird.y - b.y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < BIRD_RADIUS + 8) {
            gameState = 'gameover';
            break;
          }
        }
        if (evilMario.beamCount >= 21 && evilMario.beams.length === 0) {
          evilMario.phase = 'disappearing';
          evilMario.timer = 0;
        }
      } else if (evilMario.phase === 'disappearing') {
        evilMario.timer++;
        evilMario.y -= 2;
        if (evilMario.timer > 40) {
          gameState = 'playing';
          evilMario.active = false;
          powerStone.active = true;
          powerStone.x = bird.x;
          powerStone.y = bird.y + 30;
          if (powerStone.y > CANVAS_H - GROUND_HEIGHT - 20) powerStone.y = CANVAS_H - GROUND_HEIGHT - 20;
          powerStone.collected = false;
        }
      }

      for (let b of evilMario.beams) {
        drawBeam(b.x, b.y);
      }
      drawScorePanel();
      ctx.font = 'bold 20px "Segoe UI", sans-serif';
      ctx.fillStyle = '#ffaaaa';
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 15;
      ctx.fillText('SURVIVE THE HELL!', 70, 100);
      ctx.shadowBlur = 0;
    }

    function drawHeartbreakScene() {
      heartbreakTimer++;
      const frame = heartbreakTimer;

      if (frame >= 1200) {
        gameState = 'gameover';
        return;
      }

      const sunsetGrad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
      sunsetGrad.addColorStop(0, '#ff7e5f');
      sunsetGrad.addColorStop(0.5, '#feb47b');
      sunsetGrad.addColorStop(1, '#ffd194');
      ctx.fillStyle = sunsetGrad;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H - GROUND_HEIGHT);

      ctx.save();
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#ffaa66';
      ctx.beginPath();
      ctx.arc(300, 200, 40, 0, 2*Math.PI);
      ctx.fillStyle = '#ffcc88';
      ctx.fill();
      ctx.restore();

      ctx.fillStyle = '#8b5a2b';
      ctx.fillRect(200, 280, 100, 10);
      ctx.fillRect(200, 310, 100, 10);
      for (let i = 0; i < 5; i++) {
        ctx.fillRect(210 + i*20, 260, 10, 60);
      }

      if (frame < 240) {
        heartbreakFemaleX = 250;
        heartbreakFemaleY = 300;
        heartbreakMaleX = 70;
        heartbreakMaleY = 300;
      } else if (frame < 480) {
        let t = (frame - 240) / 240;
        heartbreakConfidentX = -50 + (heartbreakConfidentTargetX + 50) * t;
        heartbreakConfidentY = 250 + (heartbreakConfidentTargetY - 250) * t;
      } else if (frame < 720) {
        heartbreakConfidentX = heartbreakConfidentTargetX;
        heartbreakConfidentY = heartbreakConfidentTargetY;
        let hop = Math.sin((frame - 480) * 0.1) * 5;
        heartbreakFemaleX = 250 + hop;
      } else if (frame < 960) {
        let t = (frame - 720) / 240;
        heartbreakFemaleX = 250 + 200 * t;
        heartbreakConfidentX = heartbreakConfidentTargetX + 200 * t;
        heartbreakFemaleY = 300 - 20 * t;
        heartbreakConfidentY = heartbreakConfidentTargetY - 20 * t;
      } else {
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#aaaaaa';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H - GROUND_HEIGHT);
        ctx.globalAlpha = 1;
        let fade = (frame - 960) / 240;
        ctx.globalAlpha = 1 - fade;
      }

      drawBirdAt(heartbreakFemaleX, heartbreakFemaleY, 0.2, bird.wingPhase, 1.1, true, frame*0.1);
      drawBirdAt(heartbreakMaleX, heartbreakMaleY, 0.1, bird.wingPhase, 1, false, 0, crying);
      if (frame >= 240) {
        drawBirdAt(heartbreakConfidentX, heartbreakConfidentY, 0.15, bird.wingPhase, 1.1, false, 0, false, false, true);
      }

      ctx.globalAlpha = 1;
    }

    function checkPowerStoneCollision() {
      if (!powerStone.active || powerStone.collected) return false;
      let dx = bird.x - powerStone.x;
      let dy = bird.y - powerStone.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      return dist < BIRD_RADIUS + powerStone.radius;
    }

    function handleCanvasClick(e) {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      const canvasX = (clientX - rect.left) * scaleX;
      const canvasY = (clientY - rect.top) * scaleY;

      if (gameState === 'ready') {
        if (canvasX >= buttonRect.x && canvasX <= buttonRect.x + buttonRect.w &&
            canvasY >= buttonRect.y && canvasY <= buttonRect.y + buttonRect.h) {
          startGame();
        }
      } else if (gameState === 'gameover') {
        if (canvasX >= buttonRect.x && canvasX <= buttonRect.x + buttonRect.w &&
            canvasY >= buttonRect.y && canvasY <= buttonRect.y + buttonRect.h) {
          restartGame();
        }
      } else if (gameState === 'playing' || gameState === 'mario' || gameState === 'mario2' || gameState === 'power') {
        flap();
      } else if (gameState === 'easter' && specialBird.phase === 'waiting') {
        if (canvasX >= easterContinueRect.x && canvasX <= easterContinueRect.x + easterContinueRect.w &&
            canvasY >= easterContinueRect.y && canvasY <= easterContinueRect.y + easterContinueRect.h) {
          pipes = [];
          bird.y = CANVAS_H / 2;
          bird.vy = 0;
          bird.rotation = 0;
          crying = true;
          darknessActive = true;
          darknessLevel = 0;
          spawnFlowerNextPipe = true;
          gameState = 'playing';
        } else if (canvasX >= easterGoRect.x && canvasX <= easterGoRect.x + easterGoRect.w &&
                   canvasY >= easterGoRect.y && canvasY <= easterGoRect.y + easterGoRect.h) {
          specialBird.phase = 'exiting';
          fadeAlpha = 0;
        }
      }
    }

    canvas.addEventListener('click', handleCanvasClick);
    canvas.addEventListener('touchstart', handleCanvasClick, { passive: false });
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    function spawnPipe() {
      const minGapY = 80;
      const maxGapY = CANVAS_H - GROUND_HEIGHT - PIPE_GAP - 60;
      const gapY = Math.floor(Math.random() * (maxGapY - minGapY + 1)) + minGapY;
      let newPipe = {
        x: CANVAS_W,
        topY: 0,
        bottomY: gapY + PIPE_GAP,
        gapTop: gapY,
        passed: false,
        isHeartbreakPipe: false
      };
      if (score === 376) {
        newPipe.isHeartbreakPipe = true;
        heartbreakTriggerPipe = newPipe;
      }
      pipes.push(newPipe);

      if (spawnFlowerNextPipe && darknessActive && !flower.active) {
        flower.active = true;
        flower.x = newPipe.x + PIPE_WIDTH / 2;
        flower.y = newPipe.gapTop + PIPE_GAP / 2;
        flower.collected = false;
        spawnFlowerNextPipe = false;
      }
    }

    function resetGame(keepScore = false) {
      bird.y = CANVAS_H / 2;
      bird.vy = 0;
      bird.rotation = 0;
      bird.wingPhase = 0;
      pipes = [];
      if (!keepScore) score = 0;
      crying = false;
      darknessActive = false;
      darknessLevel = 0;
      flower.active = false;
      spawnFlowerNextPipe = false;
      portalTimer = 0;
      mario.active = false;
      evilMario.active = false;
      powerStone.active = false;
      powerMode = false;
      powerTimer = 0;
      gameState = 'ready';
      fadeAlpha = 0;
      heartbreakTimer = 0;
      heartbreakTriggerPipe = null;
    }

    function checkCollisions() {
      if (powerMode) {
        for (let i = pipes.length - 1; i >= 0; i--) {
          let p = pipes[i];
          if (bird.x + BIRD_RADIUS > p.x && bird.x - BIRD_RADIUS < p.x + PIPE_WIDTH) {
            if (bird.y - BIRD_RADIUS < p.gapTop || bird.y + BIRD_RADIUS > p.bottomY) {
              addExplosion(p.x + PIPE_WIDTH/2, p.gapTop - 20);
              addExplosion(p.x + PIPE_WIDTH/2, p.bottomY + 20);
              pipes.splice(i, 1);
            }
          }
        }
        if (bird.y + BIRD_RADIUS >= CANVAS_H - GROUND_HEIGHT) return true;
        if (bird.y - BIRD_RADIUS <= SKY_CEILING) return true;
        return false;
      } else {
        if (bird.y + BIRD_RADIUS >= CANVAS_H - GROUND_HEIGHT) return true;
        if (bird.y - BIRD_RADIUS <= SKY_CEILING) return true;
        for (let p of pipes) {
          if (bird.x + BIRD_RADIUS > p.x && bird.x - BIRD_RADIUS < p.x + PIPE_WIDTH) {
            if (bird.y - BIRD_RADIUS < p.gapTop || bird.y + BIRD_RADIUS > p.bottomY) {
              if (p.isHeartbreakPipe && score === 376) {
                gameState = 'heartbreakScene';
                heartbreakTimer = 0;
                pipes = [];
                bird.vy = 0;
                p.isHeartbreakPipe = false;
                return false;
              }
              return true;
            }
          }
        }
        return false;
      }
    }

    function checkFlowerCollision() {
      if (!flower.active || flower.collected) return false;
      let dx = bird.x - flower.x;
      let dy = bird.y - flower.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      return dist < BIRD_RADIUS + flower.radius;
    }

    function updateScore() {
      for (let p of pipes) {
        if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
          p.passed = true;
          score++;
          if (score > bestScore) {
            bestScore = score;
            try { localStorage.setItem('lonelybird_best', bestScore); } catch(e) {}
          }
          if (p.isHeartbreakPipe) {
            heartbreakTriggerPipe = null;
          }
        }
      }
    }

    function managePipes(delta) {
      if (gameState !== 'playing' && gameState !== 'power') return;
      if (pipes.length === 0) {
        spawnPipe();
      } else {
        const lastPipe = pipes[pipes.length - 1];
        if (lastPipe.x < CANVAS_W - PIPE_SPACING) spawnPipe();
      }
      for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= PIPE_SPEED * delta;
        if (flower.active && !flower.collected) {
          flower.x -= PIPE_SPEED * delta;
        }
        if (pipes[i].x + PIPE_WIDTH < 0) {
          pipes.splice(i, 1);
          if (flower.active && !flower.collected) {
            flower.active = false;
          }
        }
      }
    }

    function flap() {
      if (gameState === 'playing' || gameState === 'mario' || gameState === 'mario2' || gameState === 'power') {
        bird.vy = LIFT;
        bird.targetRotation = -0.5;
      }
    }

    function startGame() {
      if (gameState === 'ready') {
        gameState = 'playing';
        bird.vy = LIFT * 0.8;
        bird.targetRotation = -0.3;
      }
    }

    function restartGame() {
      resetGame(false);
    }

    function updateBird(delta) {
      if (gameState !== 'playing' && gameState !== 'falling' && gameState !== 'portal' && gameState !== 'mario' && gameState !== 'mario2' && gameState !== 'power') return;
      if (gameState !== 'portal') {
        bird.vy += GRAVITY * delta;
        if (bird.vy > MAX_VELOCITY) bird.vy = MAX_VELOCITY;
        bird.y += bird.vy * delta;
        
        // Apply normal sky ceiling
        if (bird.y - BIRD_RADIUS < SKY_CEILING) {
          bird.y = SKY_CEILING + BIRD_RADIUS;
          bird.vy = 0;
        }
        
        // Extra constraint during Mario battles: prevent going too high (max Y 300)
        if (gameState === 'mario' || gameState === 'mario2') {
          if (bird.y < 300) {
            bird.y = 300;
            bird.vy = 0;
          }
        }
        
        bird.targetRotation = bird.vy * 0.12;
        if (bird.targetRotation > 0.7) bird.targetRotation = 0.7;
        if (bird.targetRotation < -0.6) bird.targetRotation = -0.6;
        bird.rotation += (bird.targetRotation - bird.rotation) * 0.1 * delta;
        
        bird.wingPhase += 0.3 * delta;
        updateTrail();
      }
    }

    function gameLoop(now) {
      if (!lastTimestamp) {
        lastTimestamp = now;
        requestAnimationFrame(gameLoop);
        return;
      }
      deltaTime = (now - lastTimestamp) / 16.67;
      if (deltaTime > 3) deltaTime = 3;
      lastTimestamp = now;

      GRAVITY = BASE_GRAVITY * deltaTime;
      LIFT = BASE_LIFT * deltaTime;
      MAX_VELOCITY = BASE_MAX_VELOCITY * deltaTime;
      PIPE_SPEED = BASE_PIPE_SPEED * deltaTime;
      CLOUD_SPEED = BASE_CLOUD_SPEED * deltaTime;
      BUTTERFLY_SPEED = BASE_BUTTERFLY_SPEED * deltaTime;
      FIREFLY_SPEED = BASE_FIREFLY_SPEED * deltaTime;
      GRASS_SWAY = BASE_GRASS_SWAY * deltaTime;

      if (gameState !== 'mario2' && gameState !== 'heartbreakScene') {
        dayNightProgress += dayNightDirection * deltaTime;
        if (dayNightProgress > 1) {
          dayNightProgress = 1;
          dayNightDirection = -0.0002 * deltaTime;
        }
        if (dayNightProgress < 0) {
          dayNightProgress = 0;
          dayNightDirection = 0.0002 * deltaTime;
        }
        updateNightElements(deltaTime);
      }

      if (gameState === 'playing' || gameState === 'power') {
        updateBird(deltaTime);
        managePipes(deltaTime);
        updateScore();

        if (darknessActive && darknessLevel < 1) {
          darknessLevel += DARKNESS_INCREASE_RATE * deltaTime;
          if (darknessLevel > 1) darknessLevel = 1;
        }

        if (score >= 366 && darknessActive) {
          pipes = [];
          gameState = 'falling';
        }

        if (checkFlowerCollision()) {
          crying = false;
          darknessActive = false;
          darknessLevel = 0;
          flower.active = false;
          flower.collected = true;
        }

        if (powerStone.active && !powerStone.collected && checkPowerStoneCollision()) {
          powerStone.collected = true;
          powerStone.active = false;
          powerMode = true;
          powerTimer = POWER_DURATION;
        }

        if (powerMode) {
          powerTimer--;
          if (powerTimer <= 0) {
            powerMode = false;
          }
        }

        for (let i = powerExplosions.length - 1; i >= 0; i--) {
          powerExplosions[i].timer--;
          if (powerExplosions[i].timer <= 0) {
            powerExplosions.splice(i, 1);
          }
        }

        if (checkCollisions()) {
          if (score === 2 && bird.y - BIRD_RADIUS <= SKY_CEILING) {
            gameState = 'portal';
            portalTimer = 0;
            if (pipes.length > 0) {
              let randomPipe = pipes[Math.floor(Math.random() * pipes.length)];
              portalTargetY = randomPipe.gapTop + PIPE_GAP / 2;
            } else {
              portalTargetY = CANVAS_H / 2;
            }
            portalTargetX = 120;
          } else if (score === 14) {
            gameState = 'easter';
            birdStartPos.x = bird.x;
            birdStartPos.y = bird.y;
            specialBird.x = CANVAS_W + 50;
            specialBird.y = 300;
            specialBird.targetX = bird.x - 10;
            specialBird.targetY = bird.y;
            specialBird.phase = 'entering';
            specialBird.flowerBob = 0;
            fadeAlpha = 0;
          } else if (score === 369) {
            gameState = 'mario';
            mario.active = true;
            mario.x = CANVAS_W + 30;
            mario.y = 300;
            mario.phase = 'appearing';
            mario.timer = 0;
            mario.fireballs = [];
            mario.fireballCount = 0;
            mario.throwTimer = 0;
            bird.y = CANVAS_H / 2;
            bird.vy = 0;
            bird.rotation = 0;
            pipes = [];
          } else {
            gameState = 'gameover';
          }
        }
      } else if (gameState === 'falling') {
        updateBird(deltaTime);
        if (darknessActive && darknessLevel < 1) {
          darknessLevel += DARKNESS_INCREASE_RATE * deltaTime;
          if (darknessLevel > 1) darknessLevel = 1;
        }
        if (bird.y + BIRD_RADIUS >= CANVAS_H - GROUND_HEIGHT) {
          gameState = 'gameover';
        }
      } else if (gameState === 'portal') {
        portalTimer++;
        if (portalTimer >= PORTAL_DURATION) {
          score = 366;
          bird.x = portalTargetX;
          bird.y = portalTargetY;
          bird.vy = 0;
          bird.rotation = 0;
          pipes = [];
          gameState = 'playing';
        }
      } else if (gameState === 'mario') {
        updateBird(deltaTime);
      } else if (gameState === 'mario2') {
        updateBird(deltaTime);
        updateFireParticles(deltaTime);
      } else {
        bird.wingPhase += 0.15 * deltaTime;
      }

      updateBgBirds(deltaTime);
      updateClouds(deltaTime);

      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

      if (gameState === 'playing' || gameState === 'falling' || gameState === 'power') {
        drawBackground();
        drawBgBirds();
        drawPipes();
        drawFlower();
        drawPowerStone();
        drawGround();
        if (dayNightProgress > 0.5) {
          drawButterflies();
          drawFireflies();
        }
        drawBird();
        drawScorePanel();
        drawPowerTimer();
        drawExplosions();
      } else if (gameState === 'ready') {
        drawBackground();
        drawBgBirds();
        drawPipes();
        drawGround();
        if (dayNightProgress > 0.5) {
          drawButterflies();
          drawFireflies();
        }
        drawBird();
        drawReady();
      } else if (gameState === 'gameover') {
        drawBackground();
        drawBgBirds();
        drawPipes();
        drawGround();
        if (dayNightProgress > 0.5) {
          drawButterflies();
          drawFireflies();
        }
        drawBird();
        drawGameOver();
      } else if (gameState === 'easter') {
        drawEaster();
      } else if (gameState === 'portal') {
        drawBackground();
        drawBgBirds();
        drawPipes();
        drawFlower();
        drawPowerStone();
        drawGround();
        if (dayNightProgress > 0.5) {
          drawButterflies();
          drawFireflies();
        }
        ctx.globalAlpha = 0.5;
        drawBird();
        ctx.globalAlpha = 1;
        drawPortal(bird.x, bird.y, portalTimer);
        drawScorePanel();
      } else if (gameState === 'mario') {
        drawMarioScene();
      } else if (gameState === 'mario2') {
        drawMario2Scene();
      } else if (gameState === 'heartbreakScene') {
        drawHeartbreakScene();
      }

      if (darknessActive && (gameState === 'playing' || gameState === 'falling' || gameState === 'gameover' || gameState === 'power')) {
        ctx.globalAlpha = darknessLevel * 0.7;
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.globalAlpha = 1;
      }

      requestAnimationFrame(gameLoop);
    }

    resetGame(false);
    requestAnimationFrame(gameLoop);
  })();
</script>
</body>
</html>
